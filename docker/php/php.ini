; Basic overrides
memory_limit = 512M
post_max_size = 512M
upload_max_filesize = 256M
max_execution_time = 600
max_input_time = 60
max_input_vars = 10000
default_charset = "UTF-8"
short_open_tag = On
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
expose_php = Off
date.timezone = "Europe/Prague"

; Upload/temp dirs (adjust if you prefer host paths)
upload_tmp_dir = /tmp/php-upload
sys_temp_dir = /tmp

; OPCache tuned values mirrored from production
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=4500
opcache.revalidate_freq=0
opcache.validate_timestamps=1
opcache.file_cache=/var/www/opcache

; Sessions
session.save_handler = files
# Store sessions inside the app `var/sessions` so permissions are managed per-app
session.save_path = "/tmp"
session.gc_maxlifetime = 21600

; Other recommended defaults
expose_php = Off
log_errors = On
html_errors = On
