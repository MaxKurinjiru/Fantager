email:
  verify_email:
    subject: "Fantager — Verify your email"
    title: "Verify your email"
    greeting: "Hi %displayName%,"
    body: "Thanks for registering at Fantager! Click the button below to verify your email and activate your account."
    btn: "Verify Email"
    note: "This link expires in 24 hours. If you didn't create an account, you can ignore this email."
  password_reset:
    subject: "Fantager — Reset your password"
    title: "Reset your password"
    greeting: "Hi %displayName%,"
    body: "We received a request to reset the password for your Fantager account. Click the button below to set a new password."
    btn: "Reset Password"
    note: "This link expires in 1 hour. If you didn't request a password reset, you can ignore this email."
  change_email_old:
    subject: "Fantager — Confirm email change request"
    title: "Confirm E-mail Change"
    greeting: "Hi %displayName%,"
    body: "We received a request to change the email address for your Fantager account to %newEmail%."
    body_confirm: "To continue, please confirm ownership of your current email address by clicking the button below:"
    btn: "Confirm Current Email"
    note: "This link expires in 2 hours. If you did not request this change, please ignore this email."
  change_email_new:
    subject: "Fantager — Verify your new email address"
    title: "Verify Your New E-mail"
    greeting: "Hi %displayName%,"
    body: "This is the final step to update the email address for your Fantager account."
    body_confirm: "Please click the button below to verify ownership of this new email address and complete the update:"
    btn: "Verify New Email"
    note: "This link expires in 2 hours. If you did not request this change, you can ignore this email."
  cancel_account:
    subject: "Fantager — Confirm account deletion"
    title: "Confirm Account Deletion"
    greeting: "Hi %displayName%,"
    body: "We received a request to permanently delete your Fantager account."
    warning_label: "Warning:"
    warning_text: "This action is permanent. All of your progress, heroes, items, and settings will be deleted forever."
    body_confirm: "If you wish to proceed with deleting your account, please click the confirmation button below:"
    btn: "Permanently Delete My Account"
    note: "This deletion link expires in 2 hours. If you did not request to cancel your account, please ignore this email."
  inactivity_warning:
    subject: "Fantager — Inactivity warning"
    title: "Your team will be released soon"
    greeting: "Hi %displayName%,"
    body: "You have not logged in to your team \"%teamName%\" for a long time. If you do not return within %daysUntilRelease% days, your team will be released to another player."
    btn: "Log in"
    note: "Simply log in and play — activity is recorded automatically."
  inactivity_release:
    subject: "Fantager — Team released due to inactivity"
    title: "Team released"
    greeting: "Hi %displayName%,"
    body: "Your team \"%teamName%\" was released due to prolonged inactivity. You may claim a new team in %cooldownDays% days."
    note: "Your account remains active. After the cooldown, log in to claim another team."





