parameters: {}

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false
    bind:
      $mailerFrom: '%env(MAILER_FROM)%'

  # Makes classes in src/ available to be used as services
  App\:
    resource: '../src/*'
    exclude: '../src/{DependencyInjection,Entity,Enum,Config,Kernel.php}'

  # Controllers need to be public to be referenced by the routing system
  App\Controller\:
    resource: '../src/Controller'
    public: true

  App\Service\Config\RaceConfig:
    arguments:
      $projectDir: '%kernel.project_dir%'

  App\Service\Config\KingdomInitConfig:
    arguments:
      $projectDir: '%kernel.project_dir%'

  App\Service\Config\StatusEffectConfig:
    arguments:
      $projectDir: '%kernel.project_dir%'
    public: true
