name: CI

on:
  push:
    branches: [main, develop, 'fresh/**']
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker environment
        run: docker compose up -d --build

      - name: Wait for database connection
        run: |
          docker exec fantager-web sh -c "until nc -z db 3306; do echo 'waiting for database...'; sleep 1; done"

      - name: Install Composer dependencies
        run: docker exec fantager-web composer install --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: docker exec fantager-web npm ci

      - name: Build frontend assets
        run: docker exec fantager-web npm run build

      - name: PHP-CS-Fixer
        run: docker exec fantager-web composer php-cs

      - name: PHPStan
        run: docker exec fantager-web composer phpstan

      - name: PHPUnit
        run: docker exec fantager-web composer test

